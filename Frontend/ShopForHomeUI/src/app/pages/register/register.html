<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="text-center mb-4">Register</h2>

          <form (ngSubmit)="registerUser()" #registerForm="ngForm">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                name="fullName"
                [(ngModel)]="registerData.fullName"
                required
                #fullName="ngModel"
              />
              <div class="text-danger" *ngIf="fullName.invalid && fullName.touched">
                Full Name is required
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                name="email"
                [(ngModel)]="registerData.email"
                required
                email
                #email="ngModel"
              />
              <div class="text-danger" *ngIf="email.invalid && email.touched">
                Enter a valid email
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                name="password"
                [(ngModel)]="registerData.password"
                required
                minlength="6"
                #password="ngModel"
              />
              <div class="text-danger" *ngIf="password.invalid && password.touched">
                Password must be at least 6 characters
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input
                type="text"
                class="form-control"
                name="phone"
                [(ngModel)]="registerData.phone"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Address</label>
              <textarea
                class="form-control"
                name="address"
                [(ngModel)]="registerData.address"
                rows="3"
              ></textarea>
            </div>

            <button class="btn btn-primary w-100" type="submit" [disabled]="registerForm.invalid">
              Register
            </button>
          </form>

          <div class="alert alert-success mt-3" *ngIf="successMessage">
            {{ successMessage }}
          </div>

          <div class="alert alert-danger mt-3" *ngIf="errorMessage">
            {{ errorMessage }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
