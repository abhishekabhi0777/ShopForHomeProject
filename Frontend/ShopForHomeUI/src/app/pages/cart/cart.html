<div class="container mt-4">
  <h2 class="text-center mb-4">My Cart</h2>

  <div *ngIf="cartItems.length === 0" class="alert alert-info text-center">Your cart is empty.</div>

  <div *ngIf="cartItems.length > 0">
    <div class="card mb-3 shadow-sm" *ngFor="let item of cartItems">
      <div class="row g-0 align-items-center">
        <div class="col-md-3 text-center p-3">
          <img
            [src]="item.imageUrl ? item.imageUrl : 'assets/no-image.png'"
            class="img-fluid rounded"
            alt="Product Image"
            style="max-height: 150px; object-fit: contain"
          />
        </div>

        <div class="col-md-6">
          <div class="card-body">
            <h5 class="card-title">{{ item.name }}</h5>
            <p class="card-text">{{ item.description }}</p>
            <p><b>Category:</b> {{ item.categoryName }}</p>
            <p><b>Price:</b> ₹{{ item.price }}</p>
            <div class="d-flex align-items-center gap-2">
              <button class="btn btn-sm btn-secondary" (click)="decreaseQuantity(item.productId)">
                -
              </button>

              <span>{{ item.quantity }}</span>

              <button class="btn btn-sm btn-secondary" (click)="increaseQuantity(item.productId)">
                +
              </button>
            </div>
            <p><b>Subtotal:</b> ₹{{ item.price * item.quantity }}</p>
          </div>
        </div>

        <div class="col-md-3 text-center">
          <button class="btn btn-danger" (click)="removeItem(item.productId)">Remove</button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm p-3 mt-4">
      <h4>Total Amount: ₹{{ totalAmount }}</h4>

      <div class="mt-3">
        <button class="btn btn-warning me-2" (click)="clearCart()">Clear Cart</button>
        <button class="btn btn-success">Checkout</button>
      </div>
    </div>
  </div>
</div>
