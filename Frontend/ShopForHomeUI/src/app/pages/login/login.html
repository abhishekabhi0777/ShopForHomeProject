<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow p-4">
        <h2 class="text-center mb-4">Login</h2>

        <div class="alert alert-success mb-3" *ngIf="successMessage">
          {{ successMessage }}
        </div>

        <div class="alert alert-danger mb-3" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="loginUser()" #loginForm="ngForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              name="email"
              [(ngModel)]="loginData.email"
              required
              email
              #email="ngModel"
            />
            <div class="text-danger mt-1" *ngIf="email.invalid && email.touched">
              Enter a valid email
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              name="password"
              [(ngModel)]="loginData.password"
              required
              #password="ngModel"
            />
            <div class="text-danger mt-1" *ngIf="password.invalid && password.touched">
              Password is required
            </div>
          </div>

          <button class="btn btn-primary w-100" type="submit" [disabled]="loginForm.invalid">
            Login
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
