<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Our Products</h2>

    <button *ngIf="isAdmin()" class="btn btn-success" routerLink="/add-product">Add Product</button>
  </div>

  <!-- Toast Success -->
  <div
    *ngIf="successMessage"
    class="toast-container position-fixed top-0 end-0 p-3"
    style="z-index: 9999"
  >
    <div class="toast show bg-success text-white">
      <div class="toast-body">
        {{ successMessage }}
      </div>
    </div>
  </div>

  <!-- Toast Error -->
  <div
    *ngIf="errorMessage"
    class="toast-container position-fixed top-0 end-0 p-3"
    style="z-index: 9999"
  >
    <div class="toast show bg-danger text-white">
      <div class="toast-body">
        {{ errorMessage }}
      </div>
    </div>
  </div>

  <div *ngIf="isLoading" class="text-center">
    <p>Loading products...</p>
  </div>

  <div class="row" *ngIf="!isLoading">
    <div class="col-md-4 mb-4" *ngFor="let product of products">
      <div class="card h-100 shadow-sm">
        <img
          [src]="product.imageUrl ? product.imageUrl : 'assets/no-image.png'"
          class="card-img-top"
          alt="Product Image"
          style="height: 250px; width: 100%; object-fit: contain; background: #fff"
        />

        <div class="card-body">
          <h5 class="card-title">{{ product.name }}</h5>
          <p>{{ product.description }}</p>
          <p><b>Category:</b> {{ product.categoryName }}</p>
          <p><b>Price:</b> ₹{{ product.price }}</p>
          <p><b>Rating:</b> ⭐ {{ product.rating }}</p>

          <div *ngIf="!isAdmin(); else adminButtons">
            <button class="btn btn-primary me-2" (click)="addToCart(product)">Add To Cart</button>

            <button
              class="btn"
              [ngClass]="isInWishlist(product.productId) ? 'btn-success' : 'btn-outline-secondary'"
              (click)="addToWishlist(product)"
            >
              {{ isInWishlist(product.productId) ? 'Wishlisted' : 'Wishlist' }}
            </button>
          </div>

          <ng-template #adminButtons>
            <button class="btn btn-warning me-2" (click)="editProduct(product)">Edit</button>

            <button class="btn btn-danger" (click)="deleteProduct(product.productId)">
              Delete
            </button>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
